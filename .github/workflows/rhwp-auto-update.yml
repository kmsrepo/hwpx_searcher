name: Auto-build on rhwp update

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rhwp-auto-update
  cancel-in-progress: false

jobs:
  build-when-rhwp-updates:
    name: Build when rhwp latest changes
    runs-on: ubuntu-slim
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ github.token }}
      BASELINE_TAG: rhwp-auto-baseline
      BASELINE_ASSET: rhwp-version.txt
      npm_config_audit: "false"
      npm_config_fund: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Detect rhwp baseline
        id: rhwp
        shell: bash
        run: |
          set -euo pipefail
          latest_version="$(npm view @rhwp/core version)"
          baseline_version=""

          if gh release view "$BASELINE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release download "$BASELINE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$BASELINE_ASSET" \
              --dir .rhwp-baseline >/dev/null 2>&1; then
              baseline_version="$(tr -d '[:space:]' < ".rhwp-baseline/$BASELINE_ASSET")"
            fi
          fi

          echo "latest_version=${latest_version}" >> "$GITHUB_OUTPUT"
          echo "baseline_version=${baseline_version}" >> "$GITHUB_OUTPUT"

          if [ "$baseline_version" = "$latest_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when baseline matches npm latest
        if: steps.rhwp.outputs.changed != 'true'
        run: echo "@rhwp/core baseline is already ${{ steps.rhwp.outputs.baseline_version }}"

      - name: Install latest rhwp
        if: steps.rhwp.outputs.changed == 'true'
        run: |
          npm ci
          npm update @rhwp/core

      - name: Verify resolved rhwp version
        if: steps.rhwp.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          resolved_version="$(node -p "require('./node_modules/@rhwp/core/package.json').version")"
          if [ "$resolved_version" != "${{ steps.rhwp.outputs.latest_version }}" ]; then
            echo "Expected @rhwp/core ${{ steps.rhwp.outputs.latest_version }}, got ${resolved_version}" >&2
            exit 1
          fi

      - name: Type-check and unit test
        if: steps.rhwp.outputs.changed == 'true'
        run: npm test

      - name: Install Chrome for smoke test
        if: steps.rhwp.outputs.changed == 'true'
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: "true"

      - name: Browser smoke test
        if: steps.rhwp.outputs.changed == 'true'
        run: npm run html:test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build standalone release HTML
        if: steps.rhwp.outputs.changed == 'true'
        run: npm run html:build:release

      - name: Prepare release assets
        if: steps.rhwp.outputs.changed == 'true'
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          rhwp_version="${{ steps.rhwp.outputs.latest_version }}"
          asset_name="hwp-recursive-search-rhwp-${rhwp_version}.html"
          asset_path="release/${asset_name}"

          cp release/hwp-search.html "$asset_path"
          printf '%s\n' "$rhwp_version" > "$BASELINE_ASSET"

          cat > release-notes.md <<NOTES
          Automated build for @rhwp/core ${rhwp_version}.

          Baseline comparison:
          - Previous release baseline: ${BASELINE_VERSION:-none}
          - npm latest @rhwp/core: ${rhwp_version}

          The HTML asset is a standalone production build with the rhwp WASM runtime embedded.
          NOTES

          {
            echo "asset_name=${asset_name}"
            echo "asset_path=${asset_path}"
          } >> "$GITHUB_OUTPUT"
        env:
          BASELINE_VERSION: ${{ steps.rhwp.outputs.baseline_version }}

      - name: Create or update rhwp baseline release
        if: steps.rhwp.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          title="rhwp baseline ${{ steps.rhwp.outputs.latest_version }}"
          asset_path="${{ steps.assets.outputs.asset_path }}"

          if gh release view "$BASELINE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$BASELINE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA" \
              --latest=false
          else
            gh release create "$BASELINE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA" \
              --latest=false
          fi

          gh release upload "$BASELINE_TAG" \
            "$asset_path" \
            "$BASELINE_ASSET" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
